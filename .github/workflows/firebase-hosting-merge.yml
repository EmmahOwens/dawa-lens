# Automatically deploys to Firebase Hosting (dawalens.web.app) on every push to main.
# Dependency caching ensures this runs as fast as Vercel.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Node version and enable npm cache — this is what makes it fast
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Install deps (uses cache if lockfile hasn't changed)
      - name: Install dependencies
        run: npm ci

      # Build — Vite automatically reads .env.production
      - name: Build
        run: npm run build

      # Deploy the dist/ folder to Firebase Hosting live channel
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEDICINE_D3BA2 }}
          channelId: live
          projectId: medicine-d3ba2

      # Deploy to Vercel (Ensures synchronized updates)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
