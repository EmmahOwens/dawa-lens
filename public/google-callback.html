<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Google Authentication Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #0f172a;
      color: #f1f5f9;
      text-align: center;
    }
    .container {
      padding: 2rem;
      border-radius: 1rem;
      background-color: #1e293b;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    .spinner {
      border: 3px solid #334155;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Connecting your Google Calendar to Dawa Lens...</p>
    <p style="font-size: 12px; color: #94a3b8;">This window will close automatically.</p>
  </div>
  <script>
    // Safety net: close and signal failure after 10 s if nothing else fires
    var safetyTimer = setTimeout(function () {
      try {
        if (window.opener) {
          window.opener.postMessage({
            type: "GOOGLE_AUTH_FAILURE",
            error: "Authentication timed out. Please try again."
          }, window.location.origin);
        }
      } catch (e) {
        console.error("Safety-timer postMessage failed:", e);
      }
      window.close();
    }, 10000);

    function finalize() {
      clearTimeout(safetyTimer);
    }

    try {
      var hash = window.location.hash;
      if (hash && hash.length > 1) {
        // Implicit-grant response: tokens come back in the fragment
        var params = new URLSearchParams(hash.substring(1));
        var accessToken = params.get("access_token");
        var expiresIn = params.get("expires_in");
        if (accessToken) {
          window.opener.postMessage({
            type: "GOOGLE_AUTH_SUCCESS",
            accessToken: accessToken,
            expiresIn: expiresIn ? parseInt(expiresIn, 10) : 3600
          }, window.location.origin);
          finalize();
          window.close();
        } else {
          // Hash present but no token — extract any error description
          var hashError = params.get("error") || params.get("error_description") || "No access token returned";
          window.opener.postMessage({
            type: "GOOGLE_AUTH_FAILURE",
            error: hashError
          }, window.location.origin);
          finalize();
          window.close();
        }
      } else {
        // No fragment — check query string for OAuth error
        var search = window.location.search;
        var qParams = new URLSearchParams(search);
        var error = qParams.get("error") || qParams.get("error_description");
        if (error) {
          window.opener.postMessage({
            type: "GOOGLE_AUTH_FAILURE",
            error: error
          }, window.location.origin);
          finalize();
          window.close();
        }
        // If neither hash nor error: let the safetyTimer handle it
      }
    } catch (e) {
      console.error("Error in Google OAuth callback:", e);
      try {
        if (window.opener) {
          window.opener.postMessage({
            type: "GOOGLE_AUTH_FAILURE",
            error: "An unexpected error occurred during authentication."
          }, window.location.origin);
        }
      } catch (_) {}
      finalize();
      window.close();
    }
  </script>
</body>
</html>
